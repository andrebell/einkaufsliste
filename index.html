<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <title>Einkaufsliste</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3a3f47" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Einkaufsliste" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />

    <!-- Manifest for PWA -->
    <link rel="manifest" href="manifest.json" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>🛒 Einkaufsliste</h1>
      <button
        type="button"
        id="settings-btn"
        class="btn-settings"
        aria-label="Einstellungen"
      >⚙️</button>
    </header>

    <main>
      <!-- Input area for adding new items -->
      <form id="add-form" class="add-form">
        <label for="item-input" class="sr-only">Neuer Eintrag</label>
        <input
          type="text"
          id="item-input"
          placeholder="Was brauchst du?"
          autocomplete="off"
        />
        <button type="submit" class="btn-add" aria-label="Hinzufügen">+</button>
      </form>

      <!-- Shopping list -->
      <ul id="shopping-list" class="shopping-list"></ul>

      <!-- Action buttons (only visible when list has items) -->
      <div id="clear-section" class="action-section hidden">
        <button type="button" id="share-btn" class="btn-action btn-action-share">
          📤 Teilen
        </button>
        <button type="button" id="sort-btn" class="btn-action">
          A–Z Sortieren
        </button>
        <button type="button" id="clear-checked-btn" class="btn-action">
          Erledigte löschen
        </button>
        <button
          type="button"
          id="clear-all-btn"
          class="btn-action btn-action-danger"
        >
          Alles löschen
        </button>
      </div>
    </main>

    <footer>
      <small class="version-display">v<span id="app-version"></span></small>
    </footer>

    <!-- App logic -->
    <script src="app.js" defer></script>

    <!-- Name dialog -->
    <div id="name-dialog" class="dialog-overlay hidden">
      <div class="dialog-box">
        <h2 id="name-dialog-title">Wie heißt du?</h2>
        <p class="dialog-hint">Dein Name wird bei geteilten Einträgen angezeigt.</p>
        <form id="name-form">
          <input
            type="text"
            id="name-input"
            placeholder="Dein Name"
            autocomplete="name"
            required
          />
          <button type="submit" class="btn-accent">Speichern</button>
        </form>
      </div>
    </div>

    <!-- Import dialog -->
    <div id="import-dialog" class="dialog-overlay hidden">
      <div class="dialog-box">
        <h2>Liste empfangen</h2>
        <p id="import-info" class="dialog-hint"></p>
        <ul id="import-preview" class="import-preview-list"></ul>
        <div class="dialog-buttons">
          <button type="button" id="import-cancel-btn" class="btn-action">Abbrechen</button>
          <button type="button" id="import-confirm-btn" class="btn-accent">Hinzufügen</button>
        </div>
      </div>
    </div>

    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("service-worker.js")
          .then((registration) => {
            registration.addEventListener("updatefound", () => {
              const newWorker = registration.installing;
              newWorker.addEventListener("statechange", () => {
                if (newWorker.state === "activated") {
                  window.location.reload();
                }
              });
            });
          });
      }
    </script>
  </body>
</html>
